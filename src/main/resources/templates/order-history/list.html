<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head('注文履歴')}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container">
      <h2 class="mb-4">注文履歴</h2>

      <div th:if="${#lists.isEmpty(orderList)}" class="alert alert-info">注文履歴はありません。</div>

      <div th:each="order : ${orderList}" class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <div>
            <span class="fw-bold">注文番号: </span><span th:text="${order.orderNo}"></span>
            <span
              class="ms-3 badge"
              th:classappend="${order.statusDisplay == '未出荷'} ? 'bg-warning text-dark' :
                             (${order.statusDisplay == '出荷済'} ? 'bg-success' : 'bg-secondary')"
              th:text="${order.statusDisplay}"
            ></span>
          </div>
          <small class="text-muted" th:text="${#temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm')}"></small>
        </div>
        <div class="card-body">
          <div th:each="item : ${order.items}" class="d-flex align-items-center mb-2 gap-2">
            <img
              th:if="${item.imageUrl != null}"
              th:src="${item.imageUrl}"
              style="width: 50px; height: 50px; object-fit: cover"
              class="rounded"
              th:alt="${item.productName}"
            />
            <div
              th:unless="${item.imageUrl != null}"
              class="bg-light rounded d-flex align-items-center justify-content-center"
              style="width: 50px; height: 50px"
            >
              <i class="bi bi-image text-muted small"></i>
            </div>
            <div>
              <div th:text="${item.productName}"></div>
              <small class="text-muted">
                ¥<span th:text="${#numbers.formatInteger(item.unitPrice, 1, 'COMMA')}"></span>（税込: ¥<span
                  th:text="${#numbers.formatInteger(item.priceIn, 1, 'COMMA')}"
                ></span
                >）×
                <span th:text="${item.quantity}"></span>
              </small>
            </div>
          </div>

          <div class="text-end mt-2">
            <span class="text-muted small"
              >小計: ¥<span th:text="${#numbers.formatInteger(order.subtotal, 1, 'COMMA')}"></span>　消費税: ¥<span
                th:text="${#numbers.formatInteger(order.tax, 1, 'COMMA')}"
              ></span></span
            ><br />
            <span class="fw-bold"
              >合計（税込）: ¥<span th:text="${#numbers.formatInteger(order.total, 1, 'COMMA')}"></span
            ></span>
          </div>

          <div th:if="${order.canCancel}" class="mt-2 text-end">
            <form
              method="post"
              th:action="@{/order-history/{id}/cancel(id=${order.orderId})}"
              onsubmit="return confirm('この注文をキャンセルしますか？');"
            >
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit" class="btn btn-sm btn-outline-danger">キャンセルする</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
