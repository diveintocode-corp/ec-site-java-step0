<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head('ログイン')}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container" style="max-width: 400px; margin: 2rem auto">
      <h2 class="mb-4">ログイン</h2>

      <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

      <form method="post" th:action="@{/accounts/login}" th:object="${loginForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="mb-3">
          <label for="email" class="form-label">メールアドレス</label>
          <input
            type="email"
            id="email"
            th:field="*{email}"
            class="form-control"
            th:classappend="${emailError} ? 'is-invalid'"
          />
          <div th:if="${emailError}" class="invalid-feedback" th:text="${emailError}"></div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">パスワード</label>
          <input
            type="password"
            id="password"
            th:field="*{password}"
            class="form-control"
            th:classappend="${authError} ? 'is-invalid'"
          />
          <div th:if="${authError}" class="invalid-feedback" th:text="${authError}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">ログイン</button>
      </form>
      <p class="mt-3 text-center">アカウントをお持ちでない方は <a th:href="@{/accounts/signup}">会員登録</a></p>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
