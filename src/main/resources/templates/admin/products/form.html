<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout-admin :: head('商品登録・編集')}"></head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div th:replace="~{layout-admin :: sidebar}"></div>
        <div class="col-md-10 p-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a th:href="@{/admin/products}">商品管理</a></li>
              <li class="breadcrumb-item active" th:text="${editMode} ? '商品編集' : '商品登録'"></li>
            </ol>
          </nav>
          <h2 class="mb-4" th:text="${editMode} ? '商品編集' : '新規商品登録'"></h2>

          <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

          <form
            method="post"
            th:action="${editMode} ? @{/admin/products/{id}/edit(id=${product.productId})} : @{/admin/products/new}"
            enctype="multipart/form-data"
          >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
              <label for="name" class="form-label">商品名 <span class="text-danger">*</span></label>
              <input
                type="text"
                id="name"
                name="name"
                class="form-control"
                th:value="${productForm.name}"
                maxlength="128"
                required
              />
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">商品説明</label>
              <textarea
                id="description"
                name="description"
                class="form-control"
                rows="4"
                th:text="${productForm.description}"
              ></textarea>
            </div>
            <div class="mb-3">
              <label for="price" class="form-label">価格（税抜・円） <span class="text-danger">*</span></label>
              <input
                type="number"
                id="price"
                name="price"
                class="form-control"
                th:value="${productForm.price}"
                min="0"
                required
              />
            </div>
            <div class="mb-3" th:if="${editMode}">
              <label for="deletedFlag" class="form-label">状態</label>
              <select id="deletedFlag" name="deletedFlag" class="form-select">
                <option value="false" th:selected="${!productForm.deletedFlag}">販売中</option>
                <option value="true" th:selected="${productForm.deletedFlag}">停止中</option>
              </select>
            </div>

            <!-- 既存画像（編集モード） -->
            <div class="mb-3" th:if="${editMode and not #lists.isEmpty(images)}">
              <label class="form-label">現在の画像</label>
              <div class="d-flex gap-3 flex-wrap">
                <div th:each="img : ${images}" class="text-center">
                  <img
                    th:src="${img.imagePath}"
                    style="height: 100px; width: 100px; object-fit: cover"
                    class="rounded border mb-1"
                    th:alt="商品画像"
                  />
                  <div>
                    <input
                      type="checkbox"
                      name="deleteImageIds"
                      th:value="${img.productImageId}"
                      class="form-check-input"
                      th:id="'del_' + ${img.productImageId}"
                    />
                    <label class="form-check-label small text-danger" th:for="'del_' + ${img.productImageId}"
                      >削除</label
                    >
                  </div>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label for="images" class="form-label">
                商品画像（最大5枚）
                <span th:if="${editMode}" class="text-muted small">※ 既存画像に追加されます</span>
              </label>
              <input type="file" id="images" name="images" class="form-control" multiple accept="image/*" />
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <span th:text="${editMode} ? '更新する' : '登録する'"></span>
              </button>
              <a
                th:href="${editMode} ? @{/admin/products/{id}(id=${product.productId})} : @{/admin/products}"
                class="btn btn-outline-secondary"
                >キャンセル</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
    <div th:replace="~{layout-admin :: scripts}"></div>
  </body>
</html>
