<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout-admin :: head('商品管理')}"></head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div th:replace="~{layout-admin :: sidebar}"></div>
        <div class="col-md-10 p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>商品管理</h2>
            <a th:href="@{/admin/products/new}" class="btn btn-primary"> <i class="bi bi-plus-circle"></i> 新規登録 </a>
          </div>

          <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>商品名</th>
                  <th>価格（税抜）</th>
                  <th>状態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="product : ${products}">
                  <td th:text="${product.productId}"></td>
                  <td>
                    <a
                      th:href="@{/admin/products/{id}(id=${product.productId})}"
                      th:text="${product.name}"
                      class="text-decoration-none"
                    ></a>
                  </td>
                  <td>¥<span th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')}"></span></td>
                  <td>
                    <span
                      class="badge"
                      th:classappend="${product.deleted} ? 'bg-secondary' : 'bg-success'"
                      th:text="${product.deleted} ? '停止中' : '販売中'"
                    ></span>
                  </td>
                  <td>
                    <a
                      th:href="@{/admin/products/{id}/edit(id=${product.productId})}"
                      class="btn btn-sm btn-outline-primary me-1"
                      >編集</a
                    >
                    <a
                      th:href="@{/admin/products/{id}/delete(id=${product.productId})}"
                      class="btn btn-sm btn-outline-danger"
                      >削除</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="~{layout-admin :: scripts}"></div>
  </body>
</html>
