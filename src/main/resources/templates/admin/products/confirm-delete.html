<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout-admin :: head('商品削除確認')}"></head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div th:replace="~{layout-admin :: sidebar}"></div>
        <div class="col-md-10 p-4">
          <h2 class="mb-4">商品削除確認</h2>
          <div class="alert alert-warning">
            <p>以下の商品を論理削除します。この操作は取り消せません（非表示になります）。よろしいですか？</p>
            <strong th:text="${product.name}"></strong>
          </div>
          <div class="d-flex gap-2">
            <form method="post" th:action="@{/admin/products/{id}/delete(id=${product.productId})}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit" class="btn btn-danger">削除する</button>
            </form>
            <a th:href="@{/admin/products/{id}(id=${product.productId})}" class="btn btn-outline-secondary"
              >キャンセル</a
            >
          </div>
        </div>
      </div>
    </div>
    <div th:replace="~{layout-admin :: scripts}"></div>
  </body>
</html>
