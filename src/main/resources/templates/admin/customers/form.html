<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout-admin :: head('顧客編集')}"></head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div th:replace="~{layout-admin :: sidebar}"></div>
        <div class="col-md-10 p-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a th:href="@{/admin/customers}">顧客管理</a></li>
              <li class="breadcrumb-item">
                <a th:href="@{/admin/customers/{id}(id=${customer.userId})}" th:text="${customer.email}"></a>
              </li>
              <li class="breadcrumb-item active">編集</li>
            </ol>
          </nav>
          <h2 class="mb-4">顧客編集</h2>

          <form
            method="post"
            th:action="@{/admin/customers/{id}/edit(id=${customer.userId})}"
            th:object="${customerEditForm}"
          >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- アカウント情報 -->
            <div class="card mb-4">
              <div class="card-header">アカウント情報</div>
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label">メールアドレス</label>
                  <input type="email" class="form-control" th:value="${customer.email}" disabled />
                </div>
                <div class="mb-3">
                  <div class="form-check">
                    <input
                      type="checkbox"
                      id="active"
                      name="active"
                      class="form-check-input"
                      th:checked="*{active}"
                      value="true"
                    />
                    <label class="form-check-label" for="active">アカウント有効</label>
                  </div>
                </div>
              </div>
            </div>

            <!-- プロフィール情報 -->
            <div class="card mb-4" th:if="${profile != null}">
              <div class="card-header">プロフィール情報</div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="name" class="form-label">氏名</label>
                      <input type="text" id="name" name="name" class="form-control" th:field="*{name}" maxlength="64" />
                    </div>
                    <div class="mb-3">
                      <label for="postalCode" class="form-label">郵便番号</label>
                      <input
                        type="text"
                        id="postalCode"
                        name="postalCode"
                        class="form-control"
                        th:field="*{postalCode}"
                        maxlength="7"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="prefecture" class="form-label">都道府県</label>
                      <select id="prefecture" name="prefecture" class="form-select" th:field="*{prefecture}">
                        <option value="">-- 選択 --</option>
                        <option th:each="pref : ${prefectures}" th:value="${pref}" th:text="${pref}"></option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="address1" class="form-label">市区町村・番地</label>
                      <input
                        type="text"
                        id="address1"
                        name="address1"
                        class="form-control"
                        th:field="*{address1}"
                        maxlength="128"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="address2" class="form-label">建物名・部屋番号</label>
                      <input
                        type="text"
                        id="address2"
                        name="address2"
                        class="form-control"
                        th:field="*{address2}"
                        maxlength="128"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="telno" class="form-label">電話番号</label>
                      <input
                        type="text"
                        id="telno"
                        name="telno"
                        class="form-control"
                        th:field="*{telno}"
                        maxlength="11"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">更新する</button>
              <a th:href="@{/admin/customers/{id}(id=${customer.userId})}" class="btn btn-outline-secondary"
                >キャンセル</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
    <div th:replace="~{layout-admin :: scripts}"></div>
  </body>
</html>
