<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout-admin :: head('顧客管理')}"></head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div th:replace="~{layout-admin :: sidebar}"></div>
        <div class="col-md-10 p-4">
          <h2 class="mb-4">顧客管理</h2>

          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>メールアドレス</th>
                  <th>状態</th>
                  <th>登録日時</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="customer : ${customers}">
                  <td th:text="${customer.userId}"></td>
                  <td>
                    <a
                      th:href="@{/admin/customers/{id}(id=${customer.userId})}"
                      th:text="${customer.email}"
                      class="text-decoration-none"
                    ></a>
                  </td>
                  <td>
                    <span
                      class="badge"
                      th:classappend="${customer.active} ? 'bg-success' : 'bg-secondary'"
                      th:text="${customer.active} ? '有効' : '無効'"
                    ></span>
                  </td>
                  <td th:text="${#temporals.format(customer.createdAt, 'yyyy/MM/dd')}"></td>
                  <td>
                    <a
                      th:href="@{/admin/customers/{id}/edit(id=${customer.userId})}"
                      class="btn btn-sm btn-outline-primary"
                      >編集</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="~{layout-admin :: scripts}"></div>
  </body>
</html>
