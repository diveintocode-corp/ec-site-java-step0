<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理者ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-dark">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh">
      <div class="card shadow" style="width: 400px">
        <div class="card-header bg-dark text-white text-center">
          <h4 class="mb-0">管理者ログイン</h4>
        </div>
        <div class="card-body p-4">
          <form method="post" th:action="@{/admin/login}" th:object="${loginForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3">
              <label for="email" class="form-label">メールアドレス</label>
              <input type="email" id="email" th:field="*{email}" class="form-control"
                     th:classappend="${emailError} ? 'is-invalid'" autofocus />
              <div th:if="${emailError}" class="invalid-feedback" th:text="${emailError}"></div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">パスワード</label>
              <input type="password" id="password" th:field="*{password}" class="form-control"
                     th:classappend="${authError} ? 'is-invalid'" />
              <div th:if="${authError}" class="invalid-feedback" th:text="${authError}"></div>
            </div>
            <button type="submit" class="btn btn-dark w-100">ログイン</button>
          </form>
        </div>
        <div class="card-footer text-center text-muted small">初期アカウント: admin@example.com / admin1234</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
