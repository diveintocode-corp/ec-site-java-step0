<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <!-- ===== HEAD フラグメント（管理者用） ===== -->
  <head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title th:text="${title}">管理者画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #343a40;
      }
      .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.75);
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #fff;
      }
      .sidebar .nav-link i {
        margin-right: 8px;
      }
    </style>
  </head>

  <!-- ===== サイドバー フラグメント（管理者用） ===== -->
  <div th:fragment="sidebar" class="col-md-2 sidebar p-3">
    <h5 class="text-white mb-3">管理者メニュー</h5>
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/products}"><i class="bi bi-box-seam"></i> 商品管理</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/orders}"><i class="bi bi-bag-check"></i> 注文管理</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> 顧客管理</a>
      </li>
      <li class="nav-item mt-3">
        <form method="post" th:action="@{/admin/logout}">
          <button type="submit" class="nav-link btn btn-link p-0 text-start" style="color: rgba(255, 255, 255, 0.75)">
            <i class="bi bi-box-arrow-left"></i> ログアウト
          </button>
        </form>
      </li>
      <li class="nav-item mt-2">
        <a class="nav-link small" th:href="@{/h2-console}" target="_blank" style="color: rgba(255, 255, 255, 0.5)">
          <i class="bi bi-database"></i> H2 Console
        </a>
      </li>
    </ul>
  </div>

  <!-- ===== スクリプト フラグメント ===== -->
  <div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </div>
</html>
