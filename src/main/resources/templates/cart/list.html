<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head('カート')}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container">
      <h2 class="mb-4">カート</h2>

      <div th:if="${#lists.isEmpty(cart.items)}" class="alert alert-info">
        カートに商品がありません。
        <a th:href="@{/products}" class="alert-link">商品一覧に戻る</a>
      </div>

      <div th:unless="${#lists.isEmpty(cart.items)}">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead class="table-light">
              <tr>
                <th>商品</th>
                <th>数量</th>
                <th>金額（税込）</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${cart.items}">
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <img
                      th:if="${item.imageUrl != null}"
                      th:src="${item.imageUrl}"
                      style="width: 60px; height: 60px; object-fit: cover"
                      class="rounded"
                      th:alt="${item.productName}"
                    />
                    <div
                      th:unless="${item.imageUrl != null}"
                      class="bg-light rounded d-flex align-items-center justify-content-center"
                      style="width: 60px; height: 60px"
                    >
                      <i class="bi bi-image text-muted"></i>
                    </div>
                    <a
                      th:href="@{/products/{id}(id=${item.productId})}"
                      th:text="${item.productName}"
                      class="text-decoration-none"
                    ></a>
                  </div>
                </td>
                <td th:text="${item.quantity}"></td>
                <td>¥<span th:text="${#numbers.formatInteger(item.priceIn, 1, 'COMMA')}"></span></td>
                <td>
                  <form method="post" th:action="@{/cart/items/{id}/delete(id=${item.cartItemId})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button
                      type="submit"
                      class="btn btn-sm btn-outline-danger"
                      onclick="return confirm('カートから削除しますか？');"
                    >
                      削除
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card mt-3" style="max-width: 400px; margin-left: auto">
          <div class="card-body">
            <div class="d-flex justify-content-between mb-1">
              <span>小計（税抜）</span>
              <span>¥<span th:text="${#numbers.formatInteger(cart.totalEx, 1, 'COMMA')}"></span></span>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span>消費税（<span th:text="${cart.taxRate}"></span>%）</span>
              <span>¥<span th:text="${#numbers.formatInteger(cart.totalIn - cart.totalEx, 1, 'COMMA')}"></span></span>
            </div>
            <hr />
            <div class="d-flex justify-content-between fw-bold fs-5">
              <span>合計（税込）</span>
              <span class="text-danger"
                >¥<span th:text="${#numbers.formatInteger(cart.totalIn, 1, 'COMMA')}"></span
              ></span>
            </div>
            <a th:href="@{/order/confirm}" class="btn btn-danger w-100 mt-3">購入手続きへ</a>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
