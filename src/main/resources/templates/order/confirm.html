<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head('注文確認')}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container" style="max-width: 700px">
      <h2 class="mb-4">注文確認</h2>

      <!-- 配送先 -->
      <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">お届け先</h5></div>
        <div class="card-body">
          <p class="mb-1"><strong th:text="${confirmData.profile.name}"></strong></p>
          <p class="mb-1">〒<span th:text="${confirmData.profile.postalCode}"></span></p>
          <p class="mb-1" th:text="${confirmData.address}"></p>
          <p class="mb-0">TEL: <span th:text="${confirmData.profile.telno}"></span></p>
        </div>
      </div>

      <!-- 注文商品 -->
      <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">注文内容</h5></div>
        <div class="card-body p-0">
          <table class="table mb-0">
            <thead class="table-light">
              <tr>
                <th>商品名</th>
                <th>数量</th>
                <th>金額（税込）</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${confirmData.orderItems}">
                <td th:text="${item.productName}"></td>
                <td th:text="${item.quantity}"></td>
                <td>¥<span th:text="${#numbers.formatInteger(item.priceIn, 1, 'COMMA')}"></span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 金額まとめ -->
      <div class="card mb-4" style="max-width: 350px; margin-left: auto">
        <div class="card-body">
          <div class="d-flex justify-content-between mb-1">
            <span>小計（税抜）</span>
            <span>¥<span th:text="${#numbers.formatInteger(confirmData.subtotal, 1, 'COMMA')}"></span></span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span>消費税（<span th:text="${confirmData.taxRate}"></span>%）</span>
            <span>¥<span th:text="${#numbers.formatInteger(confirmData.tax, 1, 'COMMA')}"></span></span>
          </div>
          <hr />
          <div class="d-flex justify-content-between fw-bold fs-5">
            <span>合計（税込）</span>
            <span class="text-danger"
              >¥<span th:text="${#numbers.formatInteger(confirmData.total, 1, 'COMMA')}"></span
            ></span>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2 justify-content-end">
        <a th:href="@{/cart}" class="btn btn-outline-secondary">カートに戻る</a>
        <form method="post" th:action="@{/order/complete}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn btn-danger">注文を確定する</button>
        </form>
      </div>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
