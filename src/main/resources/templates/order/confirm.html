<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head('注文確認')}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container" style="max-width: 700px">
      <h2 class="mb-4">注文確認</h2>

      <form method="post" th:action="@{/order/complete}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 配送先選択 -->
        <div class="card mb-4">
          <div class="card-header"><h5 class="mb-0">お届け先</h5></div>
          <div class="card-body">

            <!-- デフォルト（プロフィール住所） -->
            <div class="form-check mb-3">
              <input type="radio" name="selectedAddress" value="profile"
                     id="addr-profile" class="form-check-input" checked />
              <label class="form-check-label" for="addr-profile">
                <strong th:text="${confirmData.selectedAddress.name}"></strong><br />
                〒<span th:text="${confirmData.selectedAddress.postalCode}"></span><br />
                <span th:text="${confirmData.address}"></span><br />
                TEL: <span th:text="${confirmData.selectedAddress.telno}"></span>
              </label>
            </div>

            <!-- 追加配送先 -->
            <div th:each="addr : ${confirmData.additionalAddresses}" class="form-check mb-3">
              <input type="radio" name="selectedAddress"
                     th:id="'addr-' + ${addr.shippingAddressId}"
                     th:value="${addr.shippingAddressId}"
                     class="form-check-input" />
              <label class="form-check-label" th:for="'addr-' + ${addr.shippingAddressId}">
                <strong th:text="${addr.name}"></strong><br />
                〒<span th:text="${addr.postalCode}"></span><br />
                <span th:text="${addr.prefecture + addr.address1 + (addr.address2 != null ? addr.address2 : '')}"></span><br />
                TEL: <span th:text="${addr.telno}"></span>
              </label>
            </div>

            <a th:href="@{/shipping-addresses/new(from='checkout')}" class="btn btn-outline-secondary btn-sm mt-1">+ 新しい配送先を追加</a>
          </div>
        </div>

        <!-- 注文商品 -->
        <div class="card mb-4">
          <div class="card-header"><h5 class="mb-0">注文内容</h5></div>
          <div class="card-body p-0">
            <table class="table mb-0">
              <thead class="table-light">
                <tr>
                  <th>商品名</th>
                  <th>数量</th>
                  <th>金額（税込）</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item : ${confirmData.orderItems}">
                  <td th:text="${item.productName}"></td>
                  <td th:text="${item.quantity}"></td>
                  <td>¥<span th:text="${#numbers.formatInteger(item.priceIn, 1, 'COMMA')}"></span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 金額まとめ -->
        <div class="card mb-4" style="max-width: 350px; margin-left: auto">
          <div class="card-body">
            <div class="d-flex justify-content-between mb-1">
              <span>小計（税抜）</span>
              <span>¥<span th:text="${#numbers.formatInteger(confirmData.subtotal, 1, 'COMMA')}"></span></span>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span>消費税（<span th:text="${confirmData.taxRate}"></span>%）</span>
              <span>¥<span th:text="${#numbers.formatInteger(confirmData.tax, 1, 'COMMA')}"></span></span>
            </div>
            <hr />
            <div class="d-flex justify-content-between fw-bold fs-5">
              <span>合計（税込）</span>
              <span class="text-danger"
                >¥<span th:text="${#numbers.formatInteger(confirmData.total, 1, 'COMMA')}"></span
              ></span>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
          <a th:href="@{/cart}" class="btn btn-outline-secondary">カートに戻る</a>
          <button type="submit" class="btn btn-danger">注文を確定する</button>
        </div>
      </form>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
