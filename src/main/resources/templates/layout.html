<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <!-- ===== HEAD フラグメント ===== -->
  <head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title th:text="${title}">オンラインショップ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  </head>

  <!-- ===== ナビバー フラグメント ===== -->
  <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/products}">オンラインショップ</a>
      <button
        th:if="${isAuthenticated}"
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div th:if="${isAuthenticated}" class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/cart}"><i class="bi bi-cart"></i> カート</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/profile/edit}">プロフィール編集</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/order-history}">注文履歴</a>
          </li>
          <li class="nav-item">
            <form method="post" th:action="@{/accounts/logout}" class="d-inline">
              <button type="submit" class="nav-link btn btn-link" style="border: none; background: none">
                ログアウト
              </button>
            </form>
          </li>
        </ul>
      </div>
      <div th:unless="${isAuthenticated}" class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/accounts/signup}">会員登録</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/accounts/login}">ログイン</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== スクリプト フラグメント ===== -->
  <div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </div>
</html>
