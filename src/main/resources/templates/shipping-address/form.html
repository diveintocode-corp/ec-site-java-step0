<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head(${pageTitle})}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container" style="max-width: 600px">
      <h2 class="mb-4" th:text="${pageTitle}"></h2>

      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <form method="post" th:action="@{${action}}" th:object="${shippingAddressForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="from" th:value="${from}" />

        <div class="mb-3">
          <label for="name" class="form-label">氏名 <span class="text-danger">*</span></label>
          <input type="text" id="name" name="name" class="form-control" th:field="*{name}" maxlength="64" required />
        </div>
        <div class="mb-3">
          <label for="postalCode" class="form-label">郵便番号（ハイフンなし7桁） <span class="text-danger">*</span></label>
          <input type="text" id="postalCode" name="postalCode" class="form-control"
                 th:field="*{postalCode}" maxlength="7" pattern="\d{7}" required />
        </div>
        <div class="mb-3">
          <label for="prefecture" class="form-label">都道府県 <span class="text-danger">*</span></label>
          <select id="prefecture" name="prefecture" class="form-select" th:field="*{prefecture}" required>
            <option value="">-- 選択してください --</option>
            <option th:each="pref : ${prefectures}" th:value="${pref}" th:text="${pref}"></option>
          </select>
        </div>
        <div class="mb-3">
          <label for="address1" class="form-label">市区町村・番地 <span class="text-danger">*</span></label>
          <input type="text" id="address1" name="address1" class="form-control"
                 th:field="*{address1}" maxlength="128" required />
        </div>
        <div class="mb-3">
          <label for="address2" class="form-label">建物名・部屋番号（任意）</label>
          <input type="text" id="address2" name="address2" class="form-control"
                 th:field="*{address2}" maxlength="128" placeholder="建物名・部屋番号（任意）" />
        </div>
        <div class="mb-3">
          <label for="telno" class="form-label">電話番号（ハイフンなし） <span class="text-danger">*</span></label>
          <input type="text" id="telno" name="telno" class="form-control"
                 th:field="*{telno}" maxlength="11" pattern="\d{1,11}" required />
        </div>

        <div class="d-flex gap-2">
          <a th:href="@{/shipping-addresses}" class="btn btn-outline-secondary">キャンセル</a>
          <button type="submit" class="btn btn-primary">保存する</button>
        </div>
      </form>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
