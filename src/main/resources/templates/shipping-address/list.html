<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <head th:replace="~{layout :: head('配送先住所')}"></head>
  <body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container" style="max-width: 700px">
      <h2 class="mb-4">配送先住所</h2>

      <div th:if="${shippingAddresses.isEmpty()}" class="text-muted mb-3">
        追加の配送先住所はまだ登録されていません。
      </div>

      <div th:each="addr : ${shippingAddresses}" class="card mb-3">
        <div class="card-body">
          <p class="mb-1"><strong th:text="${addr.name}"></strong></p>
          <p class="mb-1">〒<span th:text="${addr.postalCode}"></span></p>
          <p class="mb-1" th:text="${addr.prefecture + addr.address1 + (addr.address2 != null ? addr.address2 : '')}"></p>
          <p class="mb-2">TEL: <span th:text="${addr.telno}"></span></p>
          <div class="d-flex gap-2">
            <a th:href="@{/shipping-addresses/{id}/edit(id=${addr.shippingAddressId})}"
               class="btn btn-outline-primary btn-sm">編集</a>
            <form method="post"
                  th:action="@{/shipping-addresses/{id}/delete(id=${addr.shippingAddressId})}"
                  onsubmit="return confirm('この配送先を削除しますか？')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit" class="btn btn-outline-danger btn-sm">削除</button>
            </form>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-3">
        <a th:href="@{/profile/edit}" class="btn btn-outline-secondary">プロフィールに戻る</a>
        <a th:href="@{/shipping-addresses/new}" class="btn btn-primary">+ 新しい配送先を追加</a>
      </div>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
  </body>
</html>
