# PostgreSQL (RDS) configuration for production
spring.datasource.url=jdbc:postgresql://${DB_HOST:ec-site-db.cdkwgwcw8rcm.ap-northeast-1.rds.amazonaws.com}:5432/${DB_NAME:ecsitedb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:ecsiteadmin}
spring.datasource.password=${DB_PASSWORD}

spring.sql.init.schema-locations=classpath:schema-postgresql.sql
spring.sql.init.mode=always

spring.h2.console.enabled=false
