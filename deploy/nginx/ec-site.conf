server {
    listen 80;
    server_name _;

    # Basic Authentication — student training environment gate
    # Create the htpasswd file on the server before enabling:
    #   sudo htpasswd -cB <HTPASSWD_FILE_PATH> student
    #   (enter "password" when prompted; -B uses bcrypt)
    auth_basic "Student Training Environment";
    auth_basic_user_file <HTPASSWD_FILE_PATH>;

    # Prevent search engine indexing at the HTTP layer (server level applies to all locations)
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
